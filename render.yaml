services:
  - type: web
    name: portfolio-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: Portfolio__SiteUrl
        sync: false
